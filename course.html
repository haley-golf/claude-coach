<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Claude — 7-Day Course</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8602a;
    --accent2: #2a6cc8;
    --green: #2a7a52;
    --muted: #7a7268;
    --rule: #d4cec2;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.65;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
  }

  .overline {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    position: relative;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    line-height: 1.02;
    position: relative;
    margin-bottom: 1rem;
  }

  .subtitle {
    font-size: 0.95rem;
    color: rgba(245,240,232,0.6);
    max-width: 500px;
    margin: 0 auto;
    font-weight: 300;
    position: relative;
  }

  /* STICKY NAV */
  .sticky-nav {
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
    padding: 0.75rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .progress-track {
    flex: 1;
    height: 2px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .day-pills {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .day-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .day-pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  .day-pill.done { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* MAIN */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 5rem;
  }

  .day-card { display: none; }
  .day-card.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* DAY HEADER */
  .day-header {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    padding: 2rem 0 1.5rem;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 2rem;
  }

  .day-numeral {
    font-family: 'Playfair Display', serif;
    font-size: 6rem;
    font-weight: 900;
    line-height: 0.9;
    color: transparent;
    -webkit-text-stroke: 2px var(--ink);
    flex-shrink: 0;
  }

  .day-meta { flex: 1; padding-top: 0.5rem; }

  .day-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 0.3rem;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.4rem;
  }

  .day-meta-row {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    gap: 1.5rem;
  }

  .day-intro {
    font-size: 1rem;
    line-height: 1.75;
    color: #333;
    margin-bottom: 2rem;
    border-left: 3px solid var(--accent);
    padding-left: 1.25rem;
  }

  /* SECTION */
  .section { margin-bottom: 2rem; }

  .section-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.4rem;
    margin-bottom: 1.25rem;
  }

  /* LESSON */
  .lesson {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--white);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .lesson-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }

  .lesson-head:hover { background: var(--cream); }

  .lesson-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    flex-shrink: 0;
  }

  .lesson-title {
    font-size: 0.95rem;
    font-weight: 500;
    flex: 1;
  }

  .lesson-toggle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .lesson.open .lesson-toggle { transform: rotate(180deg); }

  .lesson-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid var(--rule);
  }

  .lesson.open .lesson-body { display: block; }

  .lesson-body p {
    font-size: 0.9rem;
    line-height: 1.75;
    color: #333;
    margin-bottom: 0.75rem;
  }

  .lesson-body p:last-child { margin-bottom: 0; }

  .lesson-body .intro-p { padding-top: 1rem; }

  /* EXAMPLE */
  .example {
    background: #f8f8f6;
    border: 1px solid #e0ddd7;
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin: 0.75rem 0;
    font-size: 0.85rem;
  }

  .example-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .example-label.bad { color: #b03030; }
  .example-label.good { color: var(--green); }
  .example-label.neutral { color: var(--muted); }

  .example p {
    font-size: 0.85rem !important;
    font-style: italic;
    color: #444 !important;
    margin-bottom: 0 !important;
    white-space: pre-wrap;
  }

  .example-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin: 0.75rem 0;
  }

  @media (max-width: 600px) {
    .example-pair { grid-template-columns: 1fr; }
  }

  /* BULLETS */
  .lesson-body ul {
    list-style: none;
    margin: 0.5rem 0 0.75rem;
  }

  .lesson-body ul li {
    font-size: 0.875rem;
    line-height: 1.65;
    padding: 0.2rem 0 0.2rem 1.25rem;
    position: relative;
    color: #333;
  }

  .lesson-body ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.75rem;
  }

  code {
    font-family: 'DM Mono', monospace;
    font-size: 0.82em;
    background: rgba(0,0,0,0.06);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    word-break: break-word;
  }

  pre {
    background: var(--ink);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin: 0.75rem 0;
    overflow-x: auto;
  }

  pre code {
    background: transparent;
    color: #c8d6c0;
    font-size: 0.8rem;
    padding: 0;
  }

  /* CALLOUT BOXES */
  .callout {
    border-radius: 4px;
    padding: 1.1rem 1.35rem;
    margin-bottom: 1rem;
  }

  .callout-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .callout p {
    font-size: 0.875rem !important;
    line-height: 1.7;
    margin-bottom: 0 !important;
  }

  .callout.tip {
    background: var(--ink);
    color: var(--paper);
  }

  .callout.tip .callout-label { color: var(--accent); }
  .callout.tip p { color: rgba(245,240,232,0.85) !important; }
  .callout.tip code { background: rgba(255,255,255,0.12); color: var(--paper); }

  .callout.warning {
    background: #fff8f0;
    border: 1px solid #e8c49a;
  }

  .callout.warning .callout-label { color: #a05010; }

  .callout.resource {
    background: #f0f5ff;
    border: 1px solid #c5d5f0;
  }

  .callout.resource .callout-label { color: var(--accent2); }
  .callout.resource p { color: #2a3a5a !important; }
  .callout.resource a { color: var(--accent2); }

  .callout.green {
    background: #f0f8f4;
    border: 1px solid #a8d8bc;
  }

  .callout.green .callout-label { color: var(--green); }

  /* CHECKLIST */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }

  .check-item:last-child { border-bottom: none; }

  .checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .check-item.checked .checkbox {
    background: var(--ink);
    border-color: var(--ink);
  }

  .check-item.checked .checkbox::after {
    content: '✓';
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
  }

  .check-item.checked .check-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .check-text {
    font-size: 0.875rem;
    line-height: 1.55;
  }

  /* PRACTICE */
  .practice-box {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .practice-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  .practice-box p {
    font-size: 0.875rem;
    line-height: 1.7;
    color: #333;
    margin-bottom: 0.5rem;
  }

  .practice-box p:last-child { margin-bottom: 0; }

  .practice-box ul {
    list-style: none;
    margin: 0.4rem 0;
  }

  .practice-box ul li {
    font-size: 0.875rem;
    padding: 0.2rem 0 0.2rem 1.25rem;
    position: relative;
    color: #333;
  }

  .practice-box ul li::before {
    content: '✦';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.55rem;
    top: 0.4rem;
  }

  /* NAV */
  .day-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
  }

  .nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.65rem 1.35rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    cursor: pointer;
    border-radius: 2px;
    color: var(--ink);
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .nav-btn.primary:hover:not(:disabled) { background: #a8501f; border-color: #a8501f; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* LINK STYLE */
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <p class="overline">7-Day Deep Dive</p>
  <h1>Master Claude</h1>
  <p class="subtitle">15–30 minutes a day. Real techniques, real examples, and everything from smart prompting to Claude Code, Projects, Cowork, and beyond.</p>
</header>

<div class="sticky-nav">
  <span class="progress-label">Your progress</span>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="day-pills" id="dayPills"></div>
</div>

<main id="main"></main>

<script>
const days = [

// ─── DAY 1 ───────────────────────────────────────────────────────────────────
{
  num: 1,
  tag: "Foundations",
  title: "How Claude Actually Thinks",
  duration: "~25 min",
  lessons: 6,
  intro: "Before you can use any tool well, you need to understand how it works. Claude isn't a search engine, a chatbot, or a magic wand — it's a language model with specific strengths, constraints, and behaviors. Today you'll learn the mental model that makes everything else click.",

  sections: [
    {
      label: "Core Mental Model",
      items: [
        {
          title: "The Context Window: Claude's Working Memory",
          body: `<p class="intro-p">Every conversation with Claude exists inside what's called a <strong>context window</strong> — think of it as a whiteboard. Everything written on that whiteboard (your messages, Claude's replies, any files you shared) is what Claude can "see" when formulating its response. When the conversation ends, the whiteboard is wiped.</p>
          <p>This has a few important implications:</p>
          <ul>
            <li>Claude has no memory between separate conversations (unless you use Projects or the Memory feature)</li>
            <li>Long conversations are actually helpful — Claude can reference anything said earlier in the same chat</li>
            <li>Uploading a reference document at the start of a conversation puts it "on the whiteboard" for Claude to use throughout</li>
            <li>Claude Sonnet 4.6 has a 1 million token context window in beta — that's roughly 750,000 words, or an entire novel</li>
          </ul>
          <div class="callout tip"><div class="callout-label">Key Insight</div><p>Don't start a new conversation unless you need to. Staying in one conversation keeps the full context available to Claude and generally produces better, more coherent results than starting fresh each time.</p></div>`
        },
        {
          title: "Claude Is Literal — Especially Now",
          body: `<p class="intro-p">Claude 4.x models take you at your word. Unlike earlier versions that would helpfully "fill in the gaps," the current Claude does exactly what you say — no more, no less. Anthropic made this change deliberately: it makes Claude more predictable and controllable. But it means you need to be explicit.</p>
          <div class="example-pair">
            <div class="example"><div class="example-label bad">❌ Too vague</div><p>"Make this better."</p></div>
            <div class="example"><div class="example-label good">✓ Explicit</div><p>"Rewrite this paragraph to be more concise. Cut it by at least 40%. Keep the main argument, remove the caveats."</p></div>
          </div>
          <p>Anthropic's own docs put it plainly: "Customers who desire the 'above and beyond' behavior might need to more explicitly request these behaviors." If you want comprehensive output, ask for it explicitly.</p>`
        },
        {
          title: "The Anatomy of a Strong Prompt",
          body: `<p class="intro-p">Research and practice have converged on a reliable prompt structure. Think of it as a short contract between you and Claude:</p>
          <ul>
            <li><strong>Role / Context:</strong> Who is Claude in this conversation? What's the situation?</li>
            <li><strong>Task:</strong> What specifically do you want done? Use active verbs: "write," "analyze," "critique," "list," "compare."</li>
            <li><strong>Constraints:</strong> What should it include, exclude, length, tone, format?</li>
            <li><strong>Output format:</strong> How should the result look? Bullet list? Paragraph? JSON? Table?</li>
            <li><strong>Uncertainty handling:</strong> What should Claude do if it's unsure? "Say so explicitly" is powerful.</li>
          </ul>
          <div class="example"><div class="example-label neutral">📋 Template</div><p>You are [role]. [Context sentence].

Task: [What you want]
Constraints: [List what matters]
If unsure: Say so explicitly and ask one clarifying question.
Format: [How to structure the output]</p></div>
          <p>You don't need every element every time. But whenever results feel off, run through this checklist — you'll almost always find the missing piece.</p>`
        }
      ]
    },
    {
      label: "Prompting Techniques",
      items: [
        {
          title: "Positive and Negative Examples: The Most Underused Technique",
          body: `<p class="intro-p">Showing Claude what you want — and what you don't want — is dramatically more effective than trying to describe it in words. This is called few-shot prompting, and it works because Claude can pattern-match from examples faster than it can interpret abstract instructions.</p>
          <div class="example"><div class="example-label good">✓ With examples</div><p>"Write a product headline in this style: 'Your inbox, finally under control.' Avoid: 'Revolutionize your productivity with AI-powered email management.' Keep it short, concrete, and benefit-focused."</p></div>
          <p>The negative example is as important as the positive one. It tells Claude where the boundary is. Without it, Claude is guessing what you mean by "not like this."</p>
          <div class="callout tip"><div class="callout-label">Pro Move</div><p>Paste 2–3 examples of past work you're proud of and say: "Match this style exactly." Claude will extract the pattern — tone, vocabulary, sentence length, structure — and apply it consistently.</p></div>`
        },
        {
          title: "Give Claude Time to Think: Prompting for Reasoning",
          body: `<p class="intro-p">For complex or nuanced tasks, asking Claude to reason step-by-step before answering significantly improves output quality. This isn't a trick — it literally changes how the model processes the problem.</p>
          <p>Several formulations work well:</p>
          <ul>
            <li>"Think step by step before answering."</li>
            <li>"Before responding, list your assumptions."</li>
            <li>"Consider 3–5 possible approaches, then recommend the best one with your reasoning."</li>
            <li>"Think through this carefully. What could go wrong with this plan?"</li>
          </ul>
          <p>For simple factual questions, this adds unnecessary overhead. Save it for decisions, analysis, plans, and complex writing tasks where nuance matters.</p>
          <div class="callout warning"><div class="callout-label">When NOT to use this</div><p>Avoid "think step by step" for quick lookups, simple formatting tasks, or short answers. It's most valuable when the task genuinely has multiple valid paths or requires avoiding a common mistake.</p></div>`
        },
        {
          title: "Prompt Chaining: Breaking Complex Tasks Into Stages",
          body: `<p class="intro-p">Instead of one giant prompt, break big tasks into sequential steps — each stage uses the output of the previous one. This is called prompt chaining, and it produces better results because Claude can focus fully on each sub-task without trying to hold the entire problem in mind at once.</p>
          <div class="example"><div class="example-label neutral">📋 Example chain for a research report</div><p>Step 1: "List 10 important questions someone must answer before forming a view on [topic]."
Step 2: "For each question, what are the strongest arguments on each side?"
Step 3: "Synthesize these into a structured report. Lead with the key tension, then walk through the major considerations."</p></div>
          <p>Each step is manageable; the final result would have been nearly impossible to get in one shot. This pattern works especially well for: research, writing, planning, debugging, and data analysis.</p>`
        }
      ]
    }
  ],

  tip: { label: "Today's Core Insight", text: "The difference between a mediocre Claude experience and a great one is almost entirely in how you prompt. Claude is powerful enough for almost anything — but it needs clear, explicit, well-structured instructions. Invest 60 seconds writing a better prompt and you'll save 10 minutes of back-and-forth." },

  practice: {
    label: "Today's Practice (15 min)",
    steps: [
      "Pick one task you'd normally do yourself or Google: a draft email, a decision you're weighing, a concept you want explained.",
      "Write a prompt using the Role + Task + Constraints + Format structure above. Be explicit.",
      "Run it. Then try the same task with a vague one-sentence prompt. Compare the results.",
      "Now add 'Think step by step before answering' and notice what changes."
    ]
  },

  resources: [
    { label: "Anthropic's official prompt engineering guide", url: "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview" },
    { label: "Anthropic's interactive prompt engineering tutorial (GitHub)", url: "https://github.com/anthropics/prompt-eng-interactive-tutorial" },
    { label: "Claude prompt best practices (Anthropic blog)", url: "https://claude.com/blog/best-practices-for-prompt-engineering" }
  ],

  checklist: [
    "Understand the context window and why it matters",
    "Write one prompt using the full Role + Task + Constraints + Format structure",
    "Try the step-by-step reasoning technique on a real task",
    "Compare a vague prompt vs. an explicit one on the same task",
  ]
},

// ─── DAY 2 ───────────────────────────────────────────────────────────────────
{
  num: 2,
  tag: "Organization",
  title: "Projects: Your Persistent Workspaces",
  duration: "~25 min",
  lessons: 5,
  intro: "The single most impactful structural change most people can make to how they use Claude is setting up Projects. Projects solve Claude's biggest limitation — the lack of persistent context — by giving you dedicated workspaces that remember your instructions, your documents, and your context across every conversation.",

  sections: [
    {
      label: "Understanding Projects",
      items: [
        {
          title: "What Projects Actually Are",
          body: `<p class="intro-p">A Project is a dedicated workspace on Claude.ai that:</p>
          <ul>
            <li>Has its own standing <strong>Instructions</strong> (a system prompt Claude reads before every conversation in that project)</li>
            <li>Has a <strong>Knowledge Base</strong> — a place to upload documents that Claude can reference across all chats</li>
            <li>Maintains <strong>separate chat history</strong> so your work conversations don't bleed into your personal ones</li>
            <li>On paid plans, uses <strong>RAG (Retrieval Augmented Generation)</strong> to scale up to 10x the normal context for large knowledge bases</li>

          <p>Projects are available to all users including free accounts (up to 5 projects). Paid plans get RAG mode, which handles large document collections seamlessly.</p>

  intro: "Claude's web search and research capabilities have gotten genuinely powerful. Today we'll cover not just how to use them, but how to combine them with advanced prompting patterns to get the kind of rigorous, synthesized output that normally takes hours of manual research.",

      items: [
        {
          title: "Web Search: How It Works and When to Use It",
          body: `<p class="intro-p">When web search is enabled (click the + icon in the chat bar and toggle it on), Claude can pull current information from the web in real time. It does this automatically when it detects the question needs fresh data, or you can explicitly say "search the web for..."</p>
          <p>When web search matters:</p>
          <ul>
            <li>Anything time-sensitive: news, stock prices, election results, recent releases</li>
            <li>Current holders of positions: "Who is the current CEO of X?" or "Who won the 2025 election?"</li>
            <li>Fast-moving topics where Claude's training data might be stale</li>
            <li>Fact-checking claims that could have changed</li>
          </ul>
          <p>Web search is less necessary for: timeless concepts, historical facts, definitions, coding help, and anything Claude can already answer reliably from training.</p>
          <div class="callout tip"><div class="callout-label">Power Pattern</div><p>After a web search, ask Claude to fetch the full page of the most relevant result: "Now fetch and read the full article at [URL] and give me the key points." Search snippets are often too brief — full-page reading produces much richer synthesis.</p></div>`
        },
        {
          title: "Deep Research: Multi-Step Autonomous Research",
          body: `<p class="intro-p">The Deep Research feature (available on paid plans) is qualitatively different from a single web search. It runs multiple autonomous search queries, reads full pages, synthesizes across sources, and produces a structured report — often in 5–10 minutes for work that would take hours manually.</p>
          <p>How to get the best results from Deep Research:</p>
          <ul>
            <li><strong>Frame it as a question, not a topic:</strong> "What are the main risks of X for a company in Y situation?" beats "research X."</li>
            <li><strong>Specify focus areas:</strong> "Focus on: recent developments (last 12 months), key players, and open questions."</li>
            <li><strong>Set the output format:</strong> "Structure the output as: executive summary, key findings, open questions, sources."</li>
            <li><strong>Add constraints:</strong> "Prioritize academic and primary sources over news articles."</li>
          </ul>
          <p>Deep Research is ideal for: market research, competitive analysis, due diligence, learning a new technical domain, policy research, and pre-meeting prep on complex topics.</p>`
        }
      ]
    },
    {
      label: "Advanced Reasoning Patterns",
      items: [
        {
          title: "The Structured Analysis Pattern",
          body: `<p class="intro-p">For complex decisions or questions, the single most effective prompt pattern is to ask Claude to structure its analysis before giving you an answer. This mirrors how good consultants and analysts actually work.</p>
          <div class="example"><div class="example-label neutral">📋 The Scoring Pattern</div><p>"I'm deciding between [Option A] and [Option B]. 

Please:
1. List the 5 most important criteria for this decision
2. Score each option against each criterion (1-10) with one sentence of reasoning
3. Identify the single most important tradeoff
4. Give your recommendation with the core argument in 2-3 sentences"</p></div>
          <p>This works because it forces Claude to make its reasoning explicit and structured — which means you can agree or disagree with specific steps rather than just accepting or rejecting the conclusion.</p>`
        },
        {
          title: "Multi-Step Document Work",
          body: `<p class="intro-p">Claude handles long documents well — but the prompts for long-form work are different from short queries. Effective patterns:</p>
          <ul>
            <li><strong>Staged generation:</strong> "We're doing this in steps. First, just create the outline. Don't write the content yet." Then approve, then write section by section.</li>
            <li><strong>Iterative refinement:</strong> "Here's a draft. First, identify 3 structural weaknesses. Then suggest rewrites for each." Keep the whole conversation in one thread.</li>
            <li><strong>Devil's advocate:</strong> "You just helped me write this argument. Now steelman the opposite position as strongly as you can."</li>
            <li><strong>The editor role:</strong> "You're a direct editor. Your only job is to cut. Remove 30% of the words from this without losing the main argument. Show me what you removed and why."</li>
          </ul>`
        },
        {
          title: "Avoiding Context Degradation in Long Conversations",
          body: `<p class="intro-p">Very long conversations can degrade in quality — Claude may start to lose track of earlier instructions, contradict itself, or drift. This is called "context rot." Signs to watch for:</p>
          <ul>
            <li>Claude asks questions the instructions already answer</li>
            <li>It forgets constraints you set earlier in the conversation</li>
            <li>Responses become inconsistent with earlier decisions</li>
          </ul>
          <p>Fixes:</p>
          <ul>
            <li><strong>Use Projects</strong> with standing instructions — you can start a fresh conversation without losing your setup</li>
            <li><strong>Re-anchor mid-conversation:</strong> "Reminder: we agreed on X approach. With that in mind..." before complex next steps</li>
            <li><strong>Summarize and restart:</strong> Ask Claude to summarize all decisions made so far, then paste that summary into a new conversation</li>
          </ul>
          <div class="callout tip"><div class="callout-label">Context Engineering Insight</div><p>Anthropic's internal guidance on context engineering: "Claude is already smart enough — intelligence is not the bottleneck, context is." The quality of what you get out is almost entirely determined by what you put in at each step.</p></div>`
        }
      ]
    }
  ],

            <li><strong>One task per session:</strong> Start a new Claude Code session for each distinct task or feature. Don't carry a session from a bug fix into a feature implementation.</li>

// ── STATE ──
let currentDay = 0;
let checked = {};

try {
  currentDay = parseInt(localStorage.getItem('claudeCourse_day') || '0');
  checked = JSON.parse(localStorage.getItem('claudeCourse_checked') || '{}');
} catch(e) {}

function save() {
  try {
    localStorage.setItem('claudeCourse_day', currentDay);
    localStorage.setItem('claudeCourse_checked', JSON.stringify(checked));
  } catch(e) {}
}

function getProgress() {
  let total = 0, done = 0;
  days.forEach((d, di) => {
    d.checklist.forEach((_, ci) => {
      total++;
      if (checked[`${di}-${ci}`]) done++;
    });
  });
  return total ? (done / total) * 100 : 0;
}

function renderPills() {
  const c = document.getElementById('dayPills');
  c.innerHTML = '';
  days.forEach((d, i) => {
    const p = document.createElement('button');
    p.className = 'day-pill';
    p.textContent = i + 1;
    const allDone = d.checklist.every((_, ci) => checked[`${i}-${ci}`]);
    if (allDone) p.classList.add('done');
    else if (i === currentDay) p.classList.add('active');
    p.addEventListener('click', () => { currentDay = i; save(); render(); window.scrollTo(0, 0); });
    c.appendChild(p);
  });
}

function renderDay(d, di) {
  let sectionHtml = '';

  d.sections.forEach(section => {
    sectionHtml += `<div class="section"><div class="section-header">${section.label}</div>`;
    section.items.forEach((item, ii) => {
      const lessonIdx = d.sections.slice(0, d.sections.indexOf(section)).reduce((acc, s) => acc + s.items.length, 0) + ii;
      sectionHtml += `
        <div class="lesson" id="lesson-${di}-${lessonIdx}">
          <div class="lesson-head" onclick="toggleLesson('lesson-${di}-${lessonIdx}')">
            <span class="lesson-num">0${lessonIdx + 1}</span>
            <span class="lesson-title">${item.title}</span>
            <div class="lesson-toggle">▾</div>
          </div>
          <div class="lesson-body">${item.body}</div>
        </div>`;
    });
    sectionHtml += `</div>`;
  });

  const resourceHtml = d.resources && d.resources.length ? `
    <div class="section">
      <div class="section-header">Further Reading</div>
      <div class="callout resource">
        <div class="callout-label">Official & Community Resources</div>
        ${d.resources.map(r => `<p><a href="${r.url}" target="_blank">↗ ${r.label}</a></p>`).join('')}
      </div>
    </div>` : '';

  const practiceHtml = `
    <div class="section">
      <div class="section-header">Hands-On Practice</div>
      <div class="practice-box">
        <div class="practice-label">${d.practice.label}</div>
        ${d.practice.steps.map((s, i) => `<p><strong>${i + 1}.</strong> ${s}</p>`).join('')}
      </div>
    </div>`;

  const tipHtml = `
    <div class="section">
      <div class="section-header">Key Insight</div>
      <div class="callout tip">
        <div class="callout-label">${d.tip.label}</div>
        <p>${d.tip.text}</p>
      </div>
    </div>`;

  const checklistHtml = `
    <div class="section">
      <div class="section-header">Day ${d.num} Checklist</div>
      <div class="checklist-items">
        ${d.checklist.map((item, ci) => `
          <div class="check-item ${checked[`${di}-${ci}`] ? 'checked' : ''}" data-di="${di}" data-ci="${ci}">
            <div class="checkbox"></div>
            <div class="check-text">${item}</div>
          </div>`).join('')}
      </div>
    </div>`;

  return `
    <div class="day-card active">
      <div class="day-header">
        <div class="day-numeral">0${d.num}</div>
        <div class="day-meta">
          <span class="day-tag">${d.tag}</span>
          <div class="day-title">${d.title}</div>
          <div class="day-meta-row">
            <span>⏱ ${d.duration}</span>
            <span>${d.lessons} lessons</span>
            <span>${d.checklist.length} tasks</span>
          </div>
        </div>
      </div>
      <p class="day-intro">${d.intro}</p>
      ${sectionHtml}
      ${tipHtml}
      ${practiceHtml}
      ${resourceHtml}
      ${checklistHtml}
      <div class="day-nav">
        <button class="nav-btn" id="prevBtn" ${di === 0 ? 'disabled' : ''}>← Previous</button>
        <span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted)">${di + 1} / ${days.length}</span>
        <button class="nav-btn primary" id="nextBtn" ${di === days.length - 1 ? 'disabled' : ''}>Next Day →</button>
      </div>
    </div>`;
}

function render() {
  document.getElementById('main').innerHTML = renderDay(days[currentDay], currentDay);
  document.getElementById('progressFill').style.width = getProgress() + '%';
  renderPills();

  // Expand first lesson
  const firstLesson = document.querySelector('.lesson');
  if (firstLesson) firstLesson.classList.add('open');

  // Checklist
  document.querySelectorAll('.check-item').forEach(el => {
    el.addEventListener('click', () => {
      const di = el.dataset.di, ci = el.dataset.ci;
      const key = `${di}-${ci}`;
      checked[key] = !checked[key];
      el.classList.toggle('checked');
      save();
      document.getElementById('progressFill').style.width = getProgress() + '%';
      renderPills();
    });
  });

  // Nav
  document.getElementById('prevBtn')?.addEventListener('click', () => { currentDay--; save(); render(); window.scrollTo(0, 0); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { currentDay++; save(); render(); window.scrollTo(0, 0); });
}

function toggleLesson(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

render();
</script>

</html>
